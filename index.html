        "@type": "Offer",

        "priceCurrency": "USD",

      },

        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "bestRating": "5",
        "ratingCount": "2847"

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Sobable really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! All core features — day counter, money saved, mood tracking, trigger logging — are 100% free forever. We offer an optional premium 'Sober Club' for advanced AI coaching and community features."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely. Your recovery journey is personal. We use bank-level encryption and never sell your data. You can use the app completely anonymously."
          }
        },
        {
          "@type": "Question",
          "name": "What if I relapse?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Recovery isn't linear. Sobable has a built-in relapse prevention plan, emergency SOS button, and supportive community. You can reset your counter without shame — what matters is getting back up."
          }
        },
        {
          "@type": "Question",
          "name": "Does it work for all addictions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Sobable works for alcohol, drugs, smoking, gambling, and more. You customize it to your specific recovery journey during onboarding."
          }
        }
      ]
    }
    </script>

    <style>
      /* Safe area insets for notched devices */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      
      /* Prevent overscroll/bounce on iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Hide scrollbars on mobile */
      body::-webkit-scrollbar {
        display: none;
      }
      
      /* Disable text selection on mobile for app-like feel */
      * {
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      
      /* Allow text selection in inputs and textareas */
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
